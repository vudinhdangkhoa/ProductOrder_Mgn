spring:
  application:
    name: demo1
  datasource:
    url: jdbc:h2:mem:demo1db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  # JPA & Hibernate
  jpa:
    hibernate:
      ddl-auto: validate # Prod dùng validate, Dev dùng update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc.batch_size: 50
    # Enable auditing cho BaseEntity
    defer-datasource-initialization: true

  # Flyway Migration
  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT Secret & Expiry
app:
  jwt:
    secret: ${JWT_SECRET:superSecretKeyGeneratedByCompany}
    expiration-ms: 86400000 # 24h
